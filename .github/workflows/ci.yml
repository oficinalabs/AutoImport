# CI conforme docs/05-INFRA-E-DEPLOY.md: lint → typecheck → build em cada PR.
# (O passo de testes entra quando existirem testes no repo.)
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # lê a versão de packageManager no package.json

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Typecheck (tools/ — coletores TS, type-stripping nativo)
        run: pnpm typecheck:tools

      - name: Build
        run: pnpm build
