# CI conforme docs/05-INFRA-E-DEPLOY.md: lint → typecheck → testes → build em cada PR.
# O serviço postgres alimenta o teste de integração do pipeline
# (tests/pipeline/integration.test.ts) — migra + seed antes dos testes.
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: autoimport
          POSTGRES_USER: autoimport
          POSTGRES_PASSWORD: autoimport
        ports:
          - 54329:5432
        options: >-
          --health-cmd "pg_isready -U autoimport -d autoimport"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
    env:
      DATABASE_URL: postgresql://autoimport:autoimport@localhost:54329/autoimport
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # lê a versão de packageManager no package.json

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Instalar dependências
        run: pnpm install --frozen-lockfile

      - name: Lint (Biome)
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Typecheck (tools/ — coletores TS, type-stripping nativo)
        run: pnpm typecheck:tools

      - name: Migrations + seed (Postgres do serviço)
        run: pnpm db:migrate && pnpm db:seed

      - name: Testes (cost engine, normalizador, pipeline)
        run: pnpm test

      - name: Build
        run: pnpm build
